name: ios_medexplorer_hari
description: Production-ready enterprise medical device exploration and visualization app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management & Dependency Injection
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.3
  flutter_hooks: ^0.20.5
  hooks_riverpod: ^2.4.10

  # Serialization & Immutability
  freezed_annotation: ^2.4.4
  json_annotation: ^4.8.1

  # Utilities
  uuid: ^4.3.3
  vector_math: ^2.2.0

  # iOS Export
  image_gallery_saver: ^2.0.3
  permission_handler: ^11.3.0

  # Localization & Storage
  intl: 0.19.0
  shared_preferences: 2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.4
  freezed: ^2.5.8
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/device_mediated_interventions/bariatric_surgery/
    - assets/images/device_mediated_interventions/cardiac_pacemakers/
    - assets/images/device_mediated_interventions/cochlear_implants/
    - assets/images/device_mediated_interventions/glaucoma_shunts/
    - assets/images/device_mediated_interventions/neuromodulation/
    - assets/images/intravascular_and_endovascular_devices/aortic_endografts/
    - assets/images/intravascular_and_endovascular_devices/coronary_stents/
    - assets/images/intravascular_and_endovascular_devices/ivc_filters/
    - assets/images/intravascular_and_endovascular_devices/liquid_embolics/
    - assets/images/structural_and_organ_replacement_implants/prosthetic_heart_valves/
    - assets/images/structural_and_organ_replacement_implants/spinal_cages_and_discs/
    - assets/images/structural_and_organ_replacement_implants/surgical_mesh/
    - assets/images/structural_and_organ_replacement_implants/total_joint_arthroplasty/
    - assets/images/structural_and_organ_replacement_implants/ventricular_assist_devices/
    - assets/mock_data/
    